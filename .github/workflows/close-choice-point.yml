name: Close Choice Point (hourly check)

on:
  schedule:
    - cron: '0 * * * *'  # every hour

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger close check
        run: |
          STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            --max-time 30 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://eigenstate.sjmorriswrites.com/api/cron/close-choice-point \
            || echo "curl_failed")
          echo "HTTP status: $STATUS"
          echo "Response body:"
          cat /tmp/response.txt || true
