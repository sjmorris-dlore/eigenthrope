name: Close Choice Point (hourly check)

on:
  schedule:
    - cron: '0 * * * *'  # every hour

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger close check
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://eigenstate.sjmorriswrites.com/api/cron/close-choice-point
